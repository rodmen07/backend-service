app = "backend-service-rodmen07-v2"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  DATABASE_URL = "sqlite:///data/app.db"
  AI_ORCHESTRATOR_PLAN_URL = "https://ai-orchestrator-service-rodmen07.fly.dev/plan"
  AUTH_ENFORCED = "true"
  AUTH_JWT_ALGORITHM = "HS256"
  AUTH_ISSUER = "auth-service"
  ALLOWED_ORIGINS = "https://rodmen07.github.io"

[[mounts]]
  source = "data"
  destination = "/data"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/"